services:
  web1:
    image: ghcr.io/hans252-9/hanslab-web1:${TAG}
    expose:
      - "80"
    volumes:
      - ./web1/logs:/var/log/app
    networks: [mon]
    depends_on:
      - php1
      - worker1
    restart: unless-stopped

  worker1:
    image: ghcr.io/hans252-9/hanslab-worker1:${TAG}
    volumes:
      - ./web1/scripts:/opt/app/scripts
      - ./web1/logs:/var/log/app
      - ./:/hostfs:ro
      - /proc:/host/proc:ro
      - ./web1/web:/opt/app/web
    networks: [mon]
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      NASA_API_KEY: ${NASA_API_KEY}
      FINNHUB_TOKEN: ${FINNHUB_TOKEN}
    depends_on:
      - php1
      - db
    restart: unless-stopped

  php1:
    image: php:8.2-fpm-alpine
    volumes:
      - ./web1/web:/usr/share/nginx/html/web
      - ./web1/logs:/var/log/app
    networks: [mon]
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    networks: [mon]
    depends_on:
      - web1

  web2:
    image: ghcr.io/hans252-9/hanslab-web2:${TAG}
    ports:
      - "8081:80"
    networks: [mon]
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: monitoring-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks: [mon]
    restart: unless-stopped

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    networks: [mon]
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [mon]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SERVER_ROOT_URL=https://hanslab.eu/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    restart: unless-stopped
    networks: [mon]
    volumes:
      - grafana_data:/var/lib/grafana

networks:
  mon:

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  web1_logs:
  worker_logs:
