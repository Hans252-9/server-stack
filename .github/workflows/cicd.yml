name: CI/CD

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web1
        uses: docker/build-push-action@v6
        with:
          context: ./web1
          file: ./web1/Dockerfile.web
          push: true
          tags: ghcr.io/hans252-9/hanslab-web1:${{ github.sha }}

      - name: Build & push worker1
        uses: docker/build-push-action@v6
        with:
          context: ./web1
          file: ./web1/Dockerfile.worker
          push: true
          tags: ghcr.io/hans252-9/hanslab-worker1:${{ github.sha }}

      - name: Build & push web2
        uses: docker/build-push-action@v6
        with:
          context: ./web2
          file: ./web2/Dockerfile
          push: true
          tags: ghcr.io/hans252-9/hanslab-web2:${{ github.sha }}

  deploy:
    needs: build_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            set -e
            cd ~/hanslab

            # Nastav TAG na commit SHA (v .env)
            if [ -f .env ]; then
              grep -q '^TAG=' .env && sed -i 's/^TAG=.*/TAG=${{ github.sha }}/' .env || echo 'TAG=${{ github.sha }}' >> .env
            else
              echo 'TAG=${{ github.sha }}' > .env
            fi

            # Login do GHCR na serveru (read token)
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d
            docker image prune -f
